name: Tests

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly catches adapters that silently broke due to retailer site changes.
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest -m "not live"

  live:
    # Only run live integration tests on the weekly schedule or manual dispatch.
    # PRs and pushes shouldn't hammer real retailer sites.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run live integration tests
        env:
          SHOE_TRACKER_LIVE: "1"
        run: pytest -m live
