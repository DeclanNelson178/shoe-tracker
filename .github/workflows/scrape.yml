name: Scrape

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

# Only one scrape at a time. Don't cancel an in-flight run with a new one —
# we'd rather a manual dispatch wait its turn than truncate the daily commit.
concurrency:
  group: scrape
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Initialize / migrate DB
        run: python -m shoe_tracker init-db

      - name: Refresh mappings and snapshot variants
        run: python -m shoe_tracker rotation map --all

      - name: Evaluate thresholds and notify
        run: python -m shoe_tracker rotation evaluate

      - name: Render dashboard
        run: python scripts/render_dashboard.py

      - name: Commit refreshed data
        run: |
          git config user.name "shoe-tracker-bot"
          git config user.email "shoe-tracker-bot@users.noreply.github.com"
          git add docs/
          git add -f shoe_tracker.db
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "auto: refresh rotation data ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi

      - name: Notify on failure
        if: failure()
        env:
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
        run: python scripts/notify_workflow_failure.py
